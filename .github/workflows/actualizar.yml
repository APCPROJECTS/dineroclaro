name: Actualizar DineroClaro diariamente

on:
  schedule:
    # Corre todos los días a las 3am hora Uruguay (UTC-3 = 6am UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # También permite correrlo manualmente desde GitHub con un click

jobs:
  actualizar:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr scraper
        run: python scraper.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "DineroClaro Bot"
          git config user.email "bot@dineroclaro.uy"
          git add data.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date +'%Y-%m-%d')"
          git push
